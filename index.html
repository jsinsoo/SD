<style>

}

.top{
    height:90px;

    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
}

.top h1{
    font-size:24px;
}

select{
    width:360px;
    padding:10px;
    font-size:17px;
    border-radius:8px;
}

.bottom{
    width:100%;
    height:calc(100vh - 90px);
    border:none;
}
</style>

<script>
function openPage(){
    const page = document.getElementById("pageSelect").value;
    if(page){

}
</script>
</head>
